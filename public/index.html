<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PAY BOUTIK – Le Clash du Clic</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #FF6B00;
  --orange-hot: #FF4500;
  --orange-glow: #FF8C00;
  --gold: #FFD700;
  --dark: #0A0A0F;
  --dark2: #12121A;
  --dark3: #1C1C2A;
  --text: #F0E6D3;
  --text-dim: #8A7A6A;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow-x:hidden; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  position: relative;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: linear-gradient(rgba(255,107,0,.03) 1px,transparent 1px), linear-gradient(90deg,rgba(255,107,0,.03) 1px,transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 20s linear infinite;
  pointer-events:none; z-index:0;
}
body::after {
  content:'';
  position:fixed; inset:0;
  background: radial-gradient(ellipse at 50% 0%, rgba(255,107,0,.12) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}
@keyframes gridMove { to { transform: translateY(40px); } }

.screen {
  position:relative; z-index:1;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:20px;
}
.screen.hidden { display:none; }

/* ── JOIN ── */
.logo-title {
  font-family:'Bebas Neue',sans-serif;
  font-size: clamp(52px,14vw,100px);
  letter-spacing:6px;
  color:var(--orange);
  text-shadow: 0 0 20px rgba(255,107,0,.8), 0 0 60px rgba(255,107,0,.4);
  text-align:center; line-height:1;
  animation: logoFlicker 4s ease-in-out infinite;
}
.logo-sub {
  font-family:'Orbitron',monospace;
  font-size:clamp(9px,2vw,13px);
  letter-spacing:6px; color:var(--text-dim);
  text-align:center; margin-top:8px; margin-bottom:32px;
}
@keyframes logoFlicker { 0%,95%,100%{opacity:1} 96%{opacity:.85} 97%{opacity:1} 98%{opacity:.9} }

.join-card {
  background:rgba(28,28,42,.95);
  border:1px solid rgba(255,107,0,.3);
  border-radius:16px; padding:36px 28px;
  width:100%; max-width:400px;
  box-shadow: 0 0 40px rgba(255,107,0,.1);
  backdrop-filter:blur(20px);
}
.join-card h2 {
  font-family:'Orbitron',monospace;
  font-size:13px; letter-spacing:3px; color:var(--orange);
  text-align:center; margin-bottom:24px;
}
.input-group label {
  display:block; font-size:11px; letter-spacing:3px;
  text-transform:uppercase; color:var(--text-dim); margin-bottom:8px;
}
.input-group input {
  width:100%;
  background:rgba(10,10,15,.8);
  border:1px solid rgba(255,107,0,.2);
  border-radius:8px; padding:14px 16px;
  font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:600;
  color:var(--text); outline:none; transition:all .3s;
  -webkit-appearance:none;
}
.input-group input:focus { border-color:var(--orange); box-shadow:0 0 20px rgba(255,107,0,.2); }

.btn-join {
  width:100%; padding:16px; margin-top:20px;
  background:linear-gradient(135deg,var(--orange-hot),var(--orange),var(--orange-glow));
  border:none; border-radius:10px;
  font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px;
  color:white; cursor:pointer;
  box-shadow:0 4px 30px rgba(255,107,0,.4);
  transition:transform .2s, box-shadow .2s;
  position:relative; overflow:hidden;
}
.btn-join::before {
  content:'';
  position:absolute; top:-50%; left:-50%; width:200%; height:200%;
  background:linear-gradient(transparent,rgba(255,255,255,.15),transparent);
  transform:rotate(45deg) translateY(-100%);
  transition:transform .5s;
}
.btn-join:hover::before { transform:rotate(45deg) translateY(100%); }
.btn-join:active { transform:scale(.97); }

.status-line {
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-top:18px; font-size:12px; letter-spacing:1px; color:var(--text-dim);
}
.dot { width:8px; height:8px; border-radius:50%; background:var(--orange); animation:pulseDot 2s infinite; }
.dot.green { background:#2ecc71; }
@keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

/* ── GAME ── */
#gameScreen {
  justify-content:flex-start;
  padding:10px 8px; gap:8px;
}

.timer-bar-wrap {
  width:100%; max-width:860px;
  display:flex; align-items:center; gap:10px;
}
.timer-label { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:2px; color:var(--text-dim); white-space:nowrap; }
.timer-bar-bg { flex:1; height:5px; background:rgba(255,107,0,.1); border-radius:3px; overflow:hidden; }
.timer-bar-fill {
  height:100%;
  background:linear-gradient(90deg,var(--orange-hot),var(--orange-glow));
  border-radius:3px; transition:width 1s linear;
  box-shadow:0 0 8px var(--orange);
}
.timer-display {
  font-family:'Orbitron',monospace; font-size:15px; font-weight:700;
  color:var(--orange); white-space:nowrap; min-width:75px; text-align:right;
}
.live-badge {
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:var(--text-dim); white-space:nowrap;
}

.game-layout {
  width:100%; max-width:860px;
  display:grid; grid-template-columns:200px 1fr; gap:10px;
  flex:1;
}

/* Leaderboard */
.leaderboard {
  background:rgba(18,18,26,.97);
  border:1px solid rgba(255,107,0,.2);
  border-radius:12px; padding:12px;
  display:flex; flex-direction:column; gap:5px;
  position:sticky; top:10px; height:fit-content;
}
.lb-title {
  font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px;
  color:var(--text-dim); text-align:center;
  padding-bottom:8px; border-bottom:1px solid rgba(255,107,0,.1); margin-bottom:2px;
}
.lb-entry {
  display:flex; align-items:center; gap:6px;
  padding:7px 8px; border-radius:7px; transition:all .3s;
}
.lb-entry.r1 { background:rgba(255,215,0,.08); border:1px solid rgba(255,215,0,.3); }
.lb-entry.me { border:1px solid rgba(255,107,0,.4); background:rgba(255,107,0,.08); }
.lb-entry.mamadou { background:rgba(255,215,0,.1); border:1px solid rgba(255,215,0,.5); box-shadow:0 0 12px rgba(255,215,0,.15); }
.lb-rank { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; width:18px; text-align:center; flex-shrink:0; color:var(--text-dim); }
.lb-entry.r1 .lb-rank, .lb-entry.mamadou .lb-rank { color:var(--gold); }
.lb-name { flex:1; font-size:12px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-entry.mamadou .lb-name { color:var(--gold); }
.lb-entry.me .lb-name { color:var(--orange); }
.lb-score { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; color:var(--orange); flex-shrink:0; }
.lb-entry.mamadou .lb-score { color:var(--gold); }
.lb-total { margin-top:6px; padding-top:6px; border-top:1px solid rgba(255,107,0,.1); font-size:10px; color:var(--text-dim); letter-spacing:1px; text-align:center; }

/* Click panel */
.click-panel {
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.my-score-label { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:3px; color:var(--text-dim); text-align:center; }
.my-score-number {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,10vw,78px);
  color:var(--orange); line-height:1; text-align:center;
  text-shadow:0 0 40px rgba(255,107,0,.6);
  transition:transform .08s;
}
.my-score-number.bump { transform:scale(1.09); }

.btn-wrap {
  position:relative;
  width:clamp(190px,45vw,260px);
  aspect-ratio:1;
}
.btn-ring {
  position:absolute; inset:-10px; border-radius:50%;
  border:2px solid rgba(255,107,0,.2);
  animation:ringRotate 8s linear infinite;
}
.btn-ring::before {
  content:''; position:absolute; top:-4px; left:50%; transform:translateX(-50%);
  width:8px; height:8px; background:var(--orange); border-radius:50%;
  box-shadow:0 0 10px var(--orange);
}
@keyframes ringRotate { to { transform:rotate(360deg); } }

#payBtn {
  width:100%; height:100%; border-radius:50%; border:none; cursor:pointer;
  background:radial-gradient(circle at 35% 30%, #FF9A40 0%, #FF6B00 30%, #CC4400 60%, #8B2500 100%);
  box-shadow:
    0 0 0 4px rgba(255,107,0,.2),
    0 0 0 8px rgba(255,107,0,.1),
    0 8px 40px rgba(255,69,0,.5),
    0 20px 60px rgba(255,69,0,.2),
    inset 0 2px 8px rgba(255,200,100,.4),
    inset 0 -4px 16px rgba(0,0,0,.4);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:3px;
  position:relative; overflow:hidden;
  transition:all .08s;
  user-select:none; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
}
#payBtn::before {
  content:''; position:absolute; top:8%; left:15%; width:50%; height:35%;
  background:radial-gradient(ellipse, rgba(255,255,255,.35) 0%, transparent 70%);
  border-radius:50%; pointer-events:none;
}
#payBtn::after {
  content:''; position:absolute; bottom:5%; left:20%; width:60%; height:25%;
  background:radial-gradient(ellipse, rgba(0,0,0,.3) 0%, transparent 70%);
  border-radius:50%; pointer-events:none;
}
.btn-main-text {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(20px,5vw,32px); letter-spacing:4px; color:white;
  text-shadow:0 2px 6px rgba(0,0,0,.6); position:relative; z-index:1; line-height:1;
}
.btn-sub-text {
  font-family:'Orbitron',monospace; font-size:clamp(7px,1.5vw,10px);
  letter-spacing:2px; color:rgba(255,255,255,.7); position:relative; z-index:1;
}
#payBtn:active, #payBtn.pressing {
  transform:scale(.93) translateY(4px);
  box-shadow:
    0 0 0 4px rgba(255,107,0,.2),
    0 2px 15px rgba(255,69,0,.4),
    inset 0 2px 8px rgba(0,0,0,.4);
}
.cps-display {
  font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px; color:var(--text-dim);
}

/* Particles */
.particle {
  position:fixed; pointer-events:none;
  font-family:'Bebas Neue',sans-serif; font-size:18px;
  color:var(--orange); text-shadow:0 0 10px var(--orange);
  animation:floatUp .7s ease-out forwards; z-index:100;
}
@keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-70px) scale(.4);opacity:0} }

/* ── LOCKED / END ── */
#lockedScreen, #endScreen { gap:20px; text-align:center; }
.big-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(44px,12vw,88px); letter-spacing:4px;
  color:var(--orange); text-shadow:0 0 40px rgba(255,107,0,.5);
}
.locked-icon { font-size:60px; }
.info-card {
  background:rgba(28,28,42,.9);
  border:1px solid rgba(255,107,0,.25);
  border-radius:14px; padding:24px 32px;
  max-width:380px; width:100%;
}
.winner-name {
  font-family:'Bebas Neue',sans-serif; font-size:50px;
  color:var(--gold); text-shadow:0 0 30px rgba(255,215,0,.6);
}
.winner-score { font-family:'Orbitron',monospace; font-size:22px; color:var(--gold); }
.countdown-big { font-family:'Orbitron',monospace; font-size:22px; color:var(--orange); margin-top:8px; }
.podium { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
.podium-card {
  background:rgba(28,28,42,.9); border:1px solid rgba(255,107,0,.2);
  border-radius:10px; padding:12px 16px; text-align:center; min-width:100px;
}
.podium-rank { font-family:'Orbitron',monospace; font-size:10px; color:var(--text-dim); }
.podium-name { font-size:14px; font-weight:700; margin:3px 0; }
.podium-score { font-family:'Orbitron',monospace; font-size:12px; color:var(--orange); }

/* Notif */
.notif {
  position:fixed; top:16px; left:50%;
  transform:translateX(-50%) translateY(-60px);
  background:rgba(28,28,42,.97);
  border:1px solid rgba(255,107,0,.4);
  border-radius:8px; padding:10px 20px;
  font-size:13px; letter-spacing:1px;
  z-index:200; transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(10px); white-space:nowrap;
}
.notif.show { transform:translateX(-50%) translateY(0); }

/* Mobile */
@media(max-width:560px) {
  .game-layout { grid-template-columns:1fr; }
  .leaderboard { order:2; position:static; }
  .click-panel { order:1; }
}
</style>
</head>
<body>

<!-- JOIN -->
<div id="joinScreen" class="screen">
  <div class="logo-title">PAY BOUTIK</div>
  <div class="logo-sub">LE CLASH DU CLIC · 2H NON-STOP</div>
  <div class="join-card">
    <h2>REJOINDRE L'ARÈNE</h2>
    <div class="input-group">
      <label>Ton pseudo</label>
      <input id="nameInput" type="text" placeholder="Entre ton nom..." maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="btn-join" onclick="joinGame()">ENTRER DANS L'ARÈNE</button>
    <div class="status-line">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Connexion...</span>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen hidden">
  <div class="timer-bar-wrap">
    <div class="timer-label">TEMPS</div>
    <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerFill" style="width:100%"></div></div>
    <div class="timer-display" id="timerDisplay">2:00:00</div>
    <div class="live-badge"><span class="dot green"></span><span id="liveCount">0</span></div>
  </div>

  <div class="game-layout">
    <div class="leaderboard">
      <div class="lb-title">🏆 TOP 10</div>
      <div id="lbEntries"></div>
      <div class="lb-total" id="lbTotal">0 joueur</div>
    </div>

    <div class="click-panel">
      <div>
        <div class="my-score-label">MES CLICS</div>
        <div class="my-score-number" id="myScoreNum">0</div>
      </div>
      <div class="btn-wrap">
        <div class="btn-ring"></div>
        <button id="payBtn" onmousedown="handleClick(event)" ontouchstart="handleClick(event)">
          <div class="btn-main-text">PAY BOUTIK</div>
          <div class="btn-sub-text">APPUIE !</div>
        </button>
      </div>
      <div class="cps-display" id="cpsDisplay">0 clic/sec</div>
    </div>
  </div>
</div>

<!-- LOCKED -->
<div id="lockedScreen" class="screen hidden">
  <div class="locked-icon">🔒</div>
  <div class="big-title" style="color:#e74c3c">PARTIE EN COURS</div>
  <div class="info-card">
    <p style="color:var(--text-dim);letter-spacing:1px;font-size:14px">Une partie est déjà en cours.<br>Tu pourras jouer à la prochaine ouverture.</p>
    <div class="countdown-big" id="lockedCountdown">—</div>
  </div>
</div>

<!-- END -->
<div id="endScreen" class="screen hidden">
  <div class="big-title">⏱ TERMINÉ !</div>
  <div class="info-card" style="border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.06)">
    <div style="font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:var(--text-dim);margin-bottom:6px">🥇 GRAND CHAMPION</div>
    <div class="winner-name" id="winnerName">—</div>
    <div class="winner-score" id="winnerScore">0 clics</div>
  </div>
  <div class="podium" id="endPodium"></div>
  <div style="color:var(--text-dim);font-size:13px;letter-spacing:1px">Prochaine partie dans</div>
  <div class="countdown-big" id="endCountdown">—</div>
</div>

<div class="notif" id="notif"></div>

<script>
// ─────────────────────────────────────────────────────────
// WebSocket connection
// ─────────────────────────────────────────────────────────
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
let ws, myId = null, myScore = 0, myName = '';
let gameEndTime = null, gameStartTime = null;
let timerInterval = null, cpsBuffer = [], clickBuffer = 0, flushInterval = null;
let reconnectTimeout = null;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('Salon ouvert', true);
    clearTimeout(reconnectTimeout);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'state') {
      const s = msg.session;
      if (s.state === 'playing') {
        // ✅ Partie en cours → on montre quand même le formulaire pour rejoindre
        gameStartTime = s.startTime;
        gameEndTime = s.endTime;
        const now = Date.now();
        if (now >= gameEndTime) {
          // Partie terminée mais pas encore en cooldown
          showEnd(msg.leaderboard, s.endTime);
        } else {
          // Partie en cours → formulaire avec message "Rejoins !"
          setStatus('Partie en cours — rejoins maintenant !', true);
          show('joinScreen');
        }
      } else if (s.state === 'ended') {
        showEnd(msg.leaderboard, s.endTime);
      } else {
        setStatus('Salon ouvert — rejoins !', true);
        show('joinScreen');
      }
    }

    if (msg.type === 'joined') {
      myId = msg.id;
      gameStartTime = msg.session.startTime;
      gameEndTime = msg.session.endTime;
      startGameScreen();
    }

    if (msg.type === 'leaderboard') {
      renderLeaderboard(msg.players, msg.total);
    }

    if (msg.type === 'game_end') {
      clearInterval(timerInterval);
      clearInterval(flushInterval);
      showEnd(msg.leaderboard, msg.endTime);
    }

    if (msg.type === 'error') {
      if (msg.reason === 'playing') {
        gameStartTime = msg.session.startTime;
        gameEndTime = msg.session.endTime;
        showLocked(msg.session, false);
        renderLeaderboard(msg.leaderboard, null);
      } else if (msg.reason === 'ended') {
        showEnd(msg.leaderboard, msg.session.endTime);
      }
    }

    if (msg.type === 'reset') {
      location.reload();
    }
  };

  ws.onclose = () => {
    setStatus('Reconnexion...', false);
    reconnectTimeout = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

function setStatus(text, ok) {
  document.getElementById('statusText').textContent = text;
  const d = document.getElementById('statusDot');
  d.className = 'dot' + (ok ? ' green' : '');
}

// ─────────────────────────────────────────────────────────
// JOIN
// ─────────────────────────────────────────────────────────
window.joinGame = function() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showNotif('Entre ton pseudo !'); return; }
  if (name.toLowerCase().includes('mamadou')) { showNotif('Ce pseudo est réservé 👑'); return; }
  if (!ws || ws.readyState !== 1) { showNotif('Connexion en cours...'); return; }
  myName = name;
  ws.send(JSON.stringify({ type: 'join', name }));
};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') window.joinGame(); });
  connect();
});

// ─────────────────────────────────────────────────────────
// GAME SCREEN
// ─────────────────────────────────────────────────────────
function startGameScreen() {
  show('gameScreen');
  updateTimer();
  timerInterval = setInterval(() => {
    if (Date.now() >= gameEndTime) { clearInterval(timerInterval); return; }
    updateTimer();
  }, 1000);
  // Flush clicks every 500ms
  flushInterval = setInterval(() => {
    if (clickBuffer > 0 && ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'click', count: clickBuffer }));
      clickBuffer = 0;
    }
  }, 500);
}

function updateTimer() {
  const remaining = Math.max(0, gameEndTime - Date.now());
  const pct = (remaining / (2 * 3600000)) * 100;
  document.getElementById('timerDisplay').textContent = fmtTime(remaining);
  document.getElementById('timerFill').style.width = pct + '%';
  if (pct < 20) document.getElementById('timerFill').style.background = '#e74c3c';
}

// ─────────────────────────────────────────────────────────
// CLICK
// ─────────────────────────────────────────────────────────
window.handleClick = function(e) {
  e.preventDefault();
  if (Date.now() >= gameEndTime) return;
  myScore++;
  clickBuffer++;
  cpsBuffer.push(Date.now());

  const el = document.getElementById('myScoreNum');
  el.textContent = myScore.toLocaleString('fr-FR');
  el.classList.remove('bump');
  requestAnimationFrame(() => el.classList.add('bump'));
  setTimeout(() => el.classList.remove('bump'), 100);

  // CPS
  const now = Date.now();
  cpsBuffer = cpsBuffer.filter(t => now - t < 1000);
  document.getElementById('cpsDisplay').textContent = cpsBuffer.length + ' clic' + (cpsBuffer.length > 1 ? 's' : '') + '/sec';

  // Particle
  const p = document.createElement('div');
  p.className = 'particle';
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  p.style.left = (cx + (Math.random()-0.5)*30) + 'px';
  p.style.top = cy + 'px';
  p.textContent = '+1';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 700);
};

// ─────────────────────────────────────────────────────────
// LEADERBOARD
// ─────────────────────────────────────────────────────────
function renderLeaderboard(players, total) {
  const medals = {1:'👑',2:'🥈',3:'🥉'};
  const c = document.getElementById('lbEntries');
  c.innerHTML = '';
  players.forEach((p, i) => {
    const rank = i + 1;
    const isMe = p.id === myId;
    const div = document.createElement('div');
    div.className = 'lb-entry' +
      (rank===1?' r1':'') +
      (isMe?' me':'') +
      (p.isMamadou?' mamadou':'');
    div.innerHTML =
      '<span class="lb-rank">' + (medals[rank]||rank) + '</span>' +
      '<span class="lb-name">' + esc(p.name) + (isMe?' (toi)':'') + '</span>' +
      '<span class="lb-score">' + p.score.toLocaleString('fr-FR') + '</span>';
    c.appendChild(div);
  });
  if (total !== null && total !== undefined) {
    document.getElementById('lbTotal').textContent = total + ' joueur' + (total>1?'s':'') + ' actif' + (total>1?'s':'');
  }
  if (document.getElementById('liveCount'))
    document.getElementById('liveCount').textContent = (total || 0) + ' en ligne';
}

// ─────────────────────────────────────────────────────────
// LOCKED
// ─────────────────────────────────────────────────────────
function showLocked(session, isEnded) {
  show('lockedScreen');
  const endTs = isEnded ? session.endTime : session.startTime + 2*3600000;
  const cooldownEnd = endTs + 24*3600000;
  function upd() {
    const now = Date.now();
    if (!isEnded && now < endTs) {
      document.getElementById('lockedCountdown').textContent = 'Partie en cours : ' + fmtTime(endTs - now);
    } else {
      const rem = Math.max(0, cooldownEnd - now);
      document.getElementById('lockedCountdown').textContent = rem > 0 ? 'Prochaine partie dans ' + fmtTime(rem) : '🎉 Bientôt !';
    }
  }
  upd(); setInterval(upd, 1000);
}

// ─────────────────────────────────────────────────────────
// END
// ─────────────────────────────────────────────────────────
function showEnd(lb, endTime) {
  show('endScreen');
  if (lb && lb.length > 0) {
    document.getElementById('winnerName').textContent = lb[0].name;
    document.getElementById('winnerScore').textContent = lb[0].score.toLocaleString('fr-FR') + ' clics';
  }
  const pod = document.getElementById('endPodium');
  pod.innerHTML = '';
  const medals2 = ['🥈','🥉','4️⃣','5️⃣'];
  (lb || []).slice(1, 5).forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'podium-card';
    d.innerHTML = '<div class="podium-rank">' + medals2[i] + ' #' + (i+2) + '</div>' +
      '<div class="podium-name">' + esc(p.name) + '</div>' +
      '<div class="podium-score">' + p.score.toLocaleString('fr-FR') + ' clics</div>';
    pod.appendChild(d);
  });
  const coolEnd = (endTime || Date.now()) + 24*3600000;
  function upd() {
    const rem = Math.max(0, coolEnd - Date.now());
    document.getElementById('endCountdown').textContent = rem > 0 ? fmtTime(rem) : '🎉 Prochaine partie bientôt !';
  }
  upd(); setInterval(upd, 1000);
}

// ─────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function fmtTime(ms) {
  if (ms <= 0) return '0:00:00';
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}
</script>
